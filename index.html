<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAPT Рассылка</title>
    <!-- Подключаем Telegram Web Apps API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Создание рассылки</h1>
        <p class="subtitle">Укажите данные для уведомления о капте</p>

        <div class="form-group">
            <label for="family">Название семьи (Противник)</label>
            <input type="text" id="family" placeholder="Например: Allegri" autocomplete="off">
        </div>

        <div class="form-group">
            <label for="time">Время капта</label>
            <input type="text" id="time" placeholder="Например: 15:30" autocomplete="off">
        </div>

        <button id="send-btn" class="main-btn">Разослать всем</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
