<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAPT Рассылка</title>
    <!-- Подключаем Telegram Web Apps API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Новая рассылка</h1>
        <p class="subtitle">Выберите тип события</p>

        <div class="form-group">
            <label for="event-type">Тип события</label>
            <select id="event-type">
                <option value="capt">Битва за территории (Капт)</option>
                <option value="kidnap">Похищение</option>
                <option value="contract">Контракт</option>
                <option value="meeting">Срочное собрание</option>
            </select>
        </div>

        <div class="form-group">
            <label for="family">Противник</label>
            <input type="text" id="family" placeholder="Например: Allegri" autocomplete="off">
        </div>

        <div class="form-group">
            <label for="time">Время</label>
            <input type="text" id="time" placeholder="Например: 15:30" autocomplete="off">
        </div>


    </div>

    <script src="app.js"></script>
</body>
</html>
